<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <!-- === PWA / Web App iOS === -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lirion">
  <meta name="theme-color" content="#facc15">
  <link rel="apple-touch-icon" href="../assets/icons/icon-180.png">
  <link rel="manifest" href="../manifest.json">
  <!-- === /PWA === -->
  <title>Lirion — Memoson · Bravo !</title>
  <link rel="stylesheet" href="../components/main.css">
  <style>
    .game-canvas {
      background: var(--training-memoson-200);
    }

    /* ── Background rotatif ────────────────────────────────────── */
    .congrats-bg {
      position: absolute;
      inset: -50%;
      background: url('../assets/illustration/congrats.png') center / cover no-repeat;
      animation: congrats-spin 60s linear infinite;
    }

    @keyframes congrats-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── Pause button ──────────────────────────────────────────── */
    .screen-header .btn--icon {
      background: var(--training-memoson-200);
      border: solid 2px var(--training-memoson-300);
      color: oklch(1 0 0);
    }
    .screen-header .btn--icon:hover {
      background: color-mix(in oklab, var(--training-memoson-200) 85%, black);
    }

    /* ── Panes ─────────────────────────────────────────────────── */
    .congrats__pane--lion {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .congrats__pane--form {
      flex: 2;
    }

    /* ── Lion ──────────────────────────────────────────────────── */
    .congrats__lion {
      position: absolute;
      bottom: -15%;
      left: 50%;
      transform: translateX(-50%);
      height: 95%;
      width: auto;
    }

    /* ── Card ──────────────────────────────────────────────────── */
    .congrats__card {
      width: 100%;
      max-width: 24rem;
    }

    /* ── Stats row ─────────────────────────────────────────────── */
    .stats-row {
      display: flex;
      flex-direction: row;
      gap: var(--space-4);
      align-items: flex-start;
      justify-content: center;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
    }

    .stat-circle {
      width: 4rem;
      height: 4rem;
      border-radius: var(--radius-full);
      background: var(--training-memoson-200);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      flex-shrink: 0;
    }

    .stat-circle__icon {
      width: 2rem;
      height: 2rem;
      filter: brightness(0) invert(1);
    }

    .stat-circle__value {
      font-size: var(--text-2xl);
      font-weight: var(--font-bold);
      color: oklch(1 0 0);
    }

    .stat-circle__badge {
      position: absolute;
      top: -0.25rem;
      right: -0.25rem;
      width: 1.5rem;
      height: 1.5rem;
      font-size: var(--text-xs);
      border: 2px solid oklch(1 0 0);
    }

    .stat-label {
      font-size: var(--text-sm);
      font-weight: var(--font-medium);
      color: var(--foreground);
      text-align: center;
      white-space: nowrap;
    }

    /* ── Circular progress ─────────────────────────────────────── */
    @property --progress-angle {
      syntax: '<angle>';
      inherits: false;
      initial-value: 0deg;
    }

    .congrats-progress {
      --progress-angle: 0deg;
      width: 4rem;
      height: 4rem;
      border-radius: var(--radius-full);
      background: conic-gradient(
        var(--training-memoson-300) 0deg,
        var(--training-memoson-300) var(--progress-angle),
        var(--training-memoson-200) var(--progress-angle)
      );
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .congrats-progress__label {
      font-size: var(--text-2xl);
      font-weight: var(--font-bold);
      color: oklch(1 0 0);
    }
  </style>
</head>
<body>
  <!-- Dialog — pause -->
  <div class="dialog-overlay" id="pause-overlay">
    <button class="btn btn--icon btn--primary dialog__close" id="btn-pause-close" aria-label="Reprendre">
      <i data-lucide="x" class="text-xl"></i>
    </button>
    <div class="dialog-wrapper">
      <div class="dialog-lion">
        <img src="../assets/illustration/thinking.png" class="dialog-lion__img" alt="">
      </div>
      <div class="dialog-pane">
        <div class="dialog">
          <div class="dialog__content">
            <h2 class="dialog__title">Ton entraînement est en pause.</h2>
          </div>
          <div class="dialog__footer">
            <button class="btn btn--default btn--lg btn--full" id="btn-pause-resume">
              <i data-lucide="play"></i>
              Reprendre
            </button>
            <button class="btn btn--outline btn--lg btn--full" id="btn-pause-quit">
              Quitter
            </button>
            <p class="dialog__text text-center">Tu devras recommencer à zéro.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="game-viewport">
    <div class="game-canvas">
      <div class="congrats-bg"></div>
      <div class="screen screen-layout">

        <header class="screen-header">
          <div class="bar-start">
            <button class="btn btn--icon btn--primary" id="btn-pause" aria-label="Quitter">
              <i data-lucide="x" class="text-2xl"></i>
            </button>
          </div>
        </header>

        <main class="screen-body screen-body--split">

          <div class="screen-pane congrats__pane--lion">
            <img src="../assets/illustration/sucess.png" class="congrats__lion" alt="">
          </div>

          <div class="screen-pane congrats__pane--form">
            <div class="card congrats__card">

              <div class="card__content">
                <div class="stats-row">

                  <!-- Memoson -->
                  <div class="stat-item">
                    <div class="stat-circle">
                      <img src="../assets/training/memoson.svg" class="stat-circle__icon" alt="">
                      <div class="badge-icon badge-icon--success stat-circle__badge">
                        <i data-lucide="check" class="text-xs"></i>
                      </div>
                    </div>
                    <span class="stat-label">Memoson</span>
                  </div>

                  <!-- Bonnes réponses -->
                  <div class="stat-item">
                    <div class="stat-circle">
                      <span class="stat-circle__value">3</span>
                    </div>
                    <span class="stat-label">Bonnes réponses</span>
                  </div>

                  <!-- Niveau — progress circulaire -->
                  <div class="stat-item">
                    <div class="congrats-progress" id="progress-circle">
                      <span class="congrats-progress__label" id="level-label">1</span>
                    </div>
                    <span class="stat-label">Niveau</span>
                  </div>

                  <!-- Minutes -->
                  <div class="stat-item">
                    <div class="stat-circle">
                      <span class="stat-circle__value">10</span>
                    </div>
                    <span class="stat-label">Minutes</span>
                  </div>

                </div>
              </div>

              <div class="card__footer">
                <button class="btn btn--default btn--lg btn--full" id="btn-next">
                  Entrainement Suivant
                  <i data-lucide="arrow-right" class="text-xl"></i>
                </button>
              </div>

            </div>
          </div>

        </main>

      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script type="module" src="../components/main.js"></script>
  <script>
    lucide.createIcons();

    // ── Pause overlay ──────────────────────────────────────────────
    const pauseOverlay  = document.getElementById('pause-overlay');
    const btnPause      = document.getElementById('btn-pause');
    const btnPauseClose = document.getElementById('btn-pause-close');
    const btnResume     = document.getElementById('btn-pause-resume');
    const btnQuit       = document.getElementById('btn-pause-quit');

    function openPause()  { pauseOverlay.classList.add('dialog-overlay--open'); }
    function closePause() { pauseOverlay.classList.remove('dialog-overlay--open'); }

    btnPause.addEventListener('click', openPause);
    btnPauseClose.addEventListener('click', closePause);
    btnResume.addEventListener('click', closePause);
    btnQuit.addEventListener('click', () => { window.location.href = '../home.html'; });
    pauseOverlay.addEventListener('click', e => { if (e.target === pauseOverlay) closePause(); });

    // ── Circular progress ──────────────────────────────────────────
    const progressEl = document.getElementById('progress-circle');
    const levelLabel = document.getElementById('level-label');

    let level = 1;
    let pct   = 0;

    setInterval(() => {
      pct += 1;
      if (pct > 100) {
        pct = 0;
        level++;
        levelLabel.textContent = level;
      }
      progressEl.style.setProperty('--progress-angle', (pct * 3.6) + 'deg');
    }, 50);

    // ── Navigation ─────────────────────────────────────────────────
    document.getElementById('btn-next').addEventListener('click', () => {
      window.location.href = '../home.html';
    });
  </script>
</body>
</html>
