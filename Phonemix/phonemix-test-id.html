<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <!-- === PWA / Web App iOS === -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lirion">
  <meta name="theme-color" content="#facc15">
  <link rel="apple-touch-icon" href="../assets/icons/icon-180.png">
  <link rel="manifest" href="../manifest.json">
  <!-- === /PWA === -->
  <title>Lirion — Phonemix · Identification · Test</title>
  <link rel="stylesheet" href="../components/main.css">
  <style>
    .game-canvas {
      background: var(--training-phonemix-200);
    }

    /* ── Title ─────────────────────────────────────────────────── */
    .phonemix-id__title {
      font-size: var(--text-xl);
      font-weight: var(--font-semibold);
      color: oklch(1 0 0);
    }

    /* ── Pause button ──────────────────────────────────────────── */
    .screen-header .btn--icon {
      background: var(--training-phonemix-200);
      border: solid 2px var(--training-phonemix-300);
      color: oklch(1 0 0);
    }
    .screen-header .btn--icon:hover {
      background: color-mix(in oklab, var(--training-phonemix-200) 85%, black);
    }

    /* ── Count — variante progress ──────────────────────────────── */
    .count {
      background: var(--training-phonemix-200);
      border: solid 2px var(--training-phonemix-300);
      color: oklch(1 0 0);
      width: auto;
      padding: var(--space-3);
      height: 2.5rem;
    }

    /* ── Help — image zoomée + ombres ──────────────────────────── */
    .help {
      box-shadow:
        0 3px 8px oklch(0 0 0 / 0.12),
        inset 0 -1px 4px oklch(0 0 0 / 0.07);
    }

    /* ── Footer ancré en bas ───────────────────────────────────── */
    .screen-layout {
      justify-content: space-between;
    }

    /* ── Field decorations ─────────────────────────────────────── */
    :root {
      --cage-h: calc((100vh - var(--screen-header-h) - var(--screen-footer-h)) / 2);
      --cage-w: calc(var(--cage-h) / 2);
    }

    .phonemix-id__football {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      height: 100vh;
      width: auto;
      pointer-events: none;
    }

    /* ── Sides — chaque moitié de screen-body ─────────────────── */
    .phonemix-test-id__side {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      width: 56%;
    }

    .phonemix-test-id__side--left  { left:  0; }
    .phonemix-test-id__side--right { right: 0; }

    .phonemix-id__letter {
      font-size: calc(var(--cage-h) * 0.9);
      font-weight: var(--font-semibold);
      color: var(--training-phonemix-300);
      line-height: 1;
      pointer-events: none;
    }

    .phonemix-test-id__player {
      height: calc(var(--cage-h) * 1.5);
      width: auto;
      pointer-events: none;
    }

    /* ── Feedback (but / oops) ─────────────────────────────────── */
    .phonemix-id__feedback {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 24vw;
      height: auto;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0);
    }

    .phonemix-id__feedback--show {
      animation: feedback-pop 1.5s linear forwards;
    }

    @keyframes feedback-pop {
      0%   { transform: translate(-50%, -50%) scale(0);    opacity: 1; }
      18%  { transform: translate(-50%, -50%) scale(1.3);  opacity: 1; }
      32%  { transform: translate(-50%, -50%) scale(0.88); opacity: 1; }
      45%  { transform: translate(-50%, -50%) scale(1.1);  opacity: 1; }
      56%  { transform: translate(-50%, -50%) scale(0.96); opacity: 1; }
      65%  { transform: translate(-50%, -50%) scale(1);    opacity: 1; }
      80%  { transform: translate(-50%, -50%) scale(1);    opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(0.6);  opacity: 0; }
    }

    /* ── Ball drop ─────────────────────────────────────────────── */
    .phonemix-id__ball {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 5rem;
      height: auto;
      cursor: grab;
      z-index: 1;
      animation: ball-drop 1.8s var(--easing-spring) 0.2s both;
    }

    @keyframes ball-drop {
      from { transform: translate(-50%, calc(-50vh - 150%)) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(720deg); }
    }
  </style>
</head>
<body>
  <!-- Dialog — pause -->
  <div class="dialog-overlay" id="pause-overlay">
    <button class="btn btn--icon btn--primary dialog__close" id="btn-pause-close" aria-label="Reprendre">
      <i data-lucide="x" class="text-xl"></i>
    </button>
    <div class="dialog-wrapper">
      <div class="dialog-lion">
        <img src="../assets/illustration/thinking.png" class="dialog-lion__img" alt="">
      </div>
      <div class="dialog-pane">
        <div class="dialog">
          <div class="dialog__content">
            <h2 class="dialog__title">Ton entraînement est en pause.</h2>
          </div>
          <div class="dialog__footer">
            <button class="btn btn--default btn--lg btn--full" id="btn-pause-resume">
              <i data-lucide="play"></i>
              Reprendre
            </button>
            <button class="btn btn--outline btn--lg btn--full" id="btn-pause-quit">
              Quitter
            </button>
            <p class="dialog__text text-center">Tu devras recommencer à zéro.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Dialog — aide Phonemix Identification -->
  <div class="dialog-overlay" id="help-overlay">
    <button class="btn btn--icon btn--primary dialog__close" id="btn-dialog-close" aria-label="Fermer">
      <i data-lucide="x" class="text-xl"></i>
    </button>
    <div class="dialog-wrapper">
      <div class="dialog-lion">
        <img src="../assets/illustration/advice.png" class="dialog-lion__img" alt="">
      </div>
      <div class="dialog-pane">
        <div class="dialog">
          <div class="dialog__content">
            <p class="dialog__text">Écoute les deux lignes de son.<br>Trouve celui qui est différent et tape dessus.</p>
          </div>
          <div class="dialog__footer">
            <button class="btn btn--default btn--lg btn--full" id="btn-dialog-start">Démarrer</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="game-viewport">
    <div class="game-canvas">
      <div class="screen screen-layout">

        <header class="screen-header">
          <div class="bar-start">
            <button class="btn btn--icon btn--primary" id="btn-pause" aria-label="Pause">
              <i data-lucide="pause" fill="#fff" class="text-2xl"></i>
            </button>
            <span class="phonemix-id__title">Phonemix - Identification</span>
          </div>
          <div class="bar-end">
            <div class="count" id="score">3/105</div>
          </div>
        </header>

        <main class="screen-body">
          <div class="phonemix-test-id__side phonemix-test-id__side--left">
            <span class="phonemix-id__letter phonemix-id__letter--d">D</span>
            <img src="../assets/illustration/phonemix/player/lion-1.png" class="phonemix-test-id__player phonemix-test-id__player--left" alt="">
          </div>
          <img src="../assets/illustration/phonemix/football-middle.svg" class="phonemix-id__football" alt="">
          <div class="phonemix-test-id__side phonemix-test-id__side--right">
            <img src="../assets/illustration/phonemix/player/lion.png" class="phonemix-test-id__player phonemix-test-id__player--right" alt="">
            <span class="phonemix-id__letter phonemix-id__letter--t">T</span>
          </div>
          <img src="../assets/illustration/phonemix/ball-base.svg"    class="phonemix-id__ball" alt="">
          <img src="../assets/illustration/phonemix/success.svg"          class="phonemix-id__feedback" id="fb-but"  alt="">
          <img src="../assets/illustration/phonemix/error.svg"         class="phonemix-id__feedback" id="fb-oops" alt="">
        </main>

        <footer class="screen-footer">
          <div class="bar-start">
            <div class="help">
              <img src="../assets/illustration/think.png" class="help__img" alt="Aide">
            </div>
          </div>
        </footer>

      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script type="module" src="../components/main.js"></script>
  <script>
    lucide.createIcons();

    // Dialog — aide
    const helpOverlay  = document.getElementById('help-overlay');
    const btnHelpClose = document.getElementById('btn-dialog-close');
    const btnHelpStart = document.getElementById('btn-dialog-start');

    function openHelp()  { helpOverlay.classList.add('dialog-overlay--open'); }
    function closeHelp() { helpOverlay.classList.remove('dialog-overlay--open'); }

    document.querySelector('.help').addEventListener('click', openHelp);
    btnHelpClose.addEventListener('click', closeHelp);
    btnHelpStart.addEventListener('click', closeHelp);
    helpOverlay.addEventListener('click', e => { if (e.target === helpOverlay) closeHelp(); });

    // Dialog — pause
    const pauseOverlay  = document.getElementById('pause-overlay');
    const btnPause      = document.getElementById('btn-pause');
    const btnPauseClose = document.getElementById('btn-pause-close');
    const btnResume     = document.getElementById('btn-pause-resume');
    const btnQuit       = document.getElementById('btn-pause-quit');

    function openPause()  { pauseOverlay.classList.add('dialog-overlay--open'); }
    function closePause() { pauseOverlay.classList.remove('dialog-overlay--open'); }

    btnPause.addEventListener('click', openPause);
    btnPauseClose.addEventListener('click', closePause);
    btnResume.addEventListener('click', closePause);
    btnQuit.addEventListener('click', () => { window.location.href = '../home.html'; });
    pauseOverlay.addEventListener('click', e => { if (e.target === pauseOverlay) closePause(); });

    // ── Ball drag ──────────────────────────────────────────────
    const ball        = document.querySelector('.phonemix-id__ball');
    const letterD     = document.querySelector('.phonemix-id__letter--d');
    const letterT     = document.querySelector('.phonemix-id__letter--t');
    const playerLeft  = document.querySelector('.phonemix-test-id__player--left');
    const playerRight = document.querySelector('.phonemix-test-id__player--right');

    const MAX_DRAG  = window.innerWidth * 0.3;
    const MAX_SCALE = 1.3;
    const THRESHOLD = MAX_DRAG * 0.35;
    const spring    = getComputedStyle(document.documentElement).getPropertyValue('--easing-spring').trim();

    const fbBut  = document.getElementById('fb-but');
    const fbOops = document.getElementById('fb-oops');

    let dragging  = false;
    let throwing  = false;
    let originX   = 0;
    let lastDragX = 0;

    function showFeedback(el, onEnd) {
      el.classList.remove('phonemix-id__feedback--show');
      void el.offsetWidth;
      el.classList.add('phonemix-id__feedback--show');
      el.addEventListener('animationend', () => {
        el.classList.remove('phonemix-id__feedback--show');
        if (onEnd) onEnd();
      }, { once: true });
    }

    function dropBallFromTop() {
      ball.style.transition = 'none';
      ball.style.transform  = 'translate(-50%, calc(-50vh - 150%)) rotate(0deg)';
      void ball.offsetWidth;
      ball.style.transition = `transform 1.8s ${spring}`;
      ball.style.transform  = 'translate(-50%, -50%) rotate(720deg)';
      setTimeout(() => { throwing = false; }, 1900);
    }

    function stopAnimation() {
      ball.style.animation = 'none';
      ball.style.transform = 'translate(-50%, -50%)';
    }
    ball.addEventListener('animationend', stopAnimation);
    setTimeout(stopAnimation, 2200);

    function throwBall(direction) {
      throwing = true;
      // Cible la lettre correspondante en l'absence de cage
      const letter = direction === 'right' ? letterT : letterD;
      const rect = letter.getBoundingClientRect();
      const targetDX = (rect.left + rect.width / 2) - window.innerWidth / 2;

      ball.style.transition = 'transform 0.45s ease-in';
      ball.style.transform  = `translate(calc(-50% + ${targetDX}px), -50%) scale(0.5)`;

      ball.addEventListener('transitionend', () => {
        showFeedback(direction === 'right' ? fbBut : fbOops, dropBallFromTop);
      }, { once: true });
    }

    function releaseBall() {
      if (!dragging) return;
      dragging = false;

      const tr = `transform 0.5s ${spring}`;
      letterD.style.transition      = tr;
      letterT.style.transition      = tr;
      playerLeft.style.transition   = tr;
      playerRight.style.transition  = tr;
      letterD.style.transform       = 'scale(1)';
      letterT.style.transform       = 'scale(1)';
      playerLeft.style.transform    = 'scale(1)';
      playerRight.style.transform   = 'scale(1)';

      if (lastDragX > THRESHOLD) {
        throwBall('right');
      } else if (lastDragX < -THRESHOLD) {
        throwBall('left');
      } else {
        ball.style.transition = `transform 0.5s ${spring}`;
        ball.style.transform  = 'translate(-50%, -50%)';
      }
      lastDragX = 0;
    }

    ball.addEventListener('pointerdown', e => {
      if (throwing) return;
      stopAnimation();
      dragging = true;
      originX  = e.clientX;
      ball.style.transition         = 'none';
      letterD.style.transition      = 'none';
      letterT.style.transition      = 'none';
      playerLeft.style.transition   = 'none';
      playerRight.style.transition  = 'none';
      ball.setPointerCapture(e.pointerId);
      e.preventDefault();
    });

    document.addEventListener('pointermove', e => {
      if (!dragging) return;
      const dragX = e.clientX - originX;
      const ratio = Math.min(Math.abs(dragX) / MAX_DRAG, 1);
      const scale = 1 + ratio * (MAX_SCALE - 1);

      lastDragX = dragX;
      ball.style.transform = `translate(calc(-50% + ${dragX}px), -50%)`;

      if (dragX > 0) {
        letterT.style.transform      = `scale(${scale})`;
        playerRight.style.transform  = `scale(${scale})`;
        letterD.style.transform      = 'scale(1)';
        playerLeft.style.transform   = 'scale(1)';
      } else if (dragX < 0) {
        letterD.style.transform      = `scale(${scale})`;
        playerLeft.style.transform   = `scale(${scale})`;
        letterT.style.transform      = 'scale(1)';
        playerRight.style.transform  = 'scale(1)';
      } else {
        letterD.style.transform      = 'scale(1)';
        letterT.style.transform      = 'scale(1)';
        playerLeft.style.transform   = 'scale(1)';
        playerRight.style.transform  = 'scale(1)';
      }
    });

    document.addEventListener('pointerup',     releaseBall);
    document.addEventListener('pointercancel', releaseBall);
  </script>
</body>
</html>
