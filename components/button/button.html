<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button — Preview</title>
  <link rel="stylesheet" href="../main.css">
  <style>
    body {
      background: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--space-8);
    }
    .preview {
      display: flex;
      flex-direction: column;
      gap: var(--space-8);
      background: var(--background);
      padding: var(--space-8);
      border-radius: var(--radius-2xl);
      border: 1px solid var(--border);
      width: 100%;
      max-width: 48rem;
    }
    .preview__section { display: flex; flex-direction: column; gap: var(--space-3); }
    .preview__label {
      font-size: var(--text-sm);
      font-weight: var(--font-semibold);
      color: var(--muted-foreground);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
    }
    .preview__row { display: flex; flex-wrap: wrap; align-items: center; gap: var(--space-3); }
  </style>
</head>
<body>
  <div class="preview">

    <div class="preview__section">
      <span class="preview__label">Variants</span>
      <div class="preview__row">
        <button class="btn btn--default">Default</button>
        <button class="btn btn--primary">Primary</button>
        <button class="btn btn--secondary">Secondary</button>
        <button class="btn btn--outline">Outline</button>
        <button class="btn btn--ghost">Ghost</button>
        <button class="btn btn--destructive">Destructive</button>
      </div>
    </div>

    <div class="preview__section">
      <span class="preview__label">Sizes</span>
      <div class="preview__row">
        <button class="btn btn--default btn--sm">Small</button>
        <button class="btn btn--default">Default</button>
        <button class="btn btn--default btn--lg">Large</button>
      </div>
    </div>

    <div class="preview__section">
      <span class="preview__label">Icon</span>
      <div class="preview__row">
        <button class="btn btn--default btn--icon btn--sm" aria-label="Fermer">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
        <button class="btn btn--default btn--icon" aria-label="Fermer">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
        <button class="btn btn--primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
          Continuer
        </button>
      </div>
    </div>

    <div class="preview__section">
      <span class="preview__label">Full width</span>
      <button class="btn btn--default btn--lg btn--full">Jouer</button>
    </div>

    <div class="preview__section">
      <span class="preview__label">Disabled</span>
      <div class="preview__row">
        <button class="btn btn--default" disabled>Default</button>
        <button class="btn btn--primary" disabled>Primary</button>
        <button class="btn btn--outline" disabled>Outline</button>
      </div>
    </div>

  </div>
</body>
</html>
