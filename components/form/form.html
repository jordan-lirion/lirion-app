<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form — Preview</title>
  <link rel="stylesheet" href="../main.css">
  <style>
    body {
      background: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--space-8);
    }
    .preview {
      display: flex;
      flex-direction: column;
      gap: var(--space-8);
      background: var(--background);
      padding: var(--space-8);
      border-radius: var(--radius-2xl);
      border: 1px solid var(--border);
      width: 100%;
      max-width: 28rem;
    }
    .preview__section { display: flex; flex-direction: column; gap: var(--space-4); }
    .preview__label {
      font-size: var(--text-sm);
      font-weight: var(--font-semibold);
      color: var(--muted-foreground);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
    }
  </style>
</head>
<body>
  <div class="preview">

    <!-- Text input (email) -->
    <div class="preview__section">
      <span class="preview__label">Text — avec icône</span>
      <div class="field">
        <label class="label" for="f-email">Adresse email</label>
        <div class="input-group input-group--icon-start">
          <input class="input" type="email" id="f-email" placeholder="prenom@exemple.com" autocomplete="email">
          <span class="input-group__icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          </span>
        </div>
      </div>
    </div>

    <!-- Password input with toggle -->
    <div class="preview__section">
      <span class="preview__label">Password — avec toggle</span>
      <div class="field">
        <label class="label" for="f-password">Mot de passe</label>
        <div class="input-group input-group--icon-end">
          <input class="input" type="password" id="f-password" placeholder="••••••••" autocomplete="current-password">
          <button type="button"
                  class="input-group__icon input-group__icon--end input-group__icon--btn"
                  data-password-toggle
                  aria-label="Afficher le mot de passe">
            <!-- eye — shown when password is masked -->
            <span class="icon--eye" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            </span>
            <!-- eye-off — shown when password is visible -->
            <span class="icon--eye-off hidden" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>
            </span>
          </button>
        </div>
      </div>
    </div>

    <!-- Error state -->
    <div class="preview__section">
      <span class="preview__label">Error state</span>
      <div class="field">
        <label class="label" for="f-email-err">Adresse email</label>
        <div class="input-group input-group--icon-start">
          <input class="input input--error" type="email" id="f-email-err" value="invalide@" autocomplete="off">
          <span class="input-group__icon" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          </span>
        </div>
        <span class="hint hint--error">Adresse email invalide.</span>
      </div>
    </div>

    <!-- Disabled state -->
    <div class="preview__section">
      <span class="preview__label">Disabled</span>
      <div class="field">
        <label class="label" for="f-disabled">Email</label>
        <input class="input" type="text" id="f-disabled" placeholder="Désactivé" disabled>
      </div>
    </div>

  </div>

  <script type="module" src="./form.js"></script>
</body>
</html>
