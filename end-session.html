<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <!-- === PWA / Web App iOS === -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lirion">
  <meta name="theme-color" content="#facc15">
  <link rel="apple-touch-icon" href="assets/icons/icon-180.png">
  <link rel="manifest" href="manifest.json">
  <!-- === /PWA === -->
  <title>Lirion — Fin de séance</title>
  <link rel="stylesheet" href="components/main.css">
  <style>
    .game-canvas {
      background: var(--muted);
    }

    /* ── Background rotatif ────────────────────────────────────── */
    .congrats-bg {
      position: absolute;
      inset: -50%;
      background: url('assets/illustration/congrats.png') center / cover no-repeat;
      animation: congrats-spin 60s linear infinite;
    }

    @keyframes congrats-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── Panes ─────────────────────────────────────────────────── */
    .session__pane--lion {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .session__pane--cards {
      flex: 2;
      flex-direction: column;
      gap: var(--space-4);
      padding: var(--space-5);
      align-items: center;
      justify-content: center;
    }

    /* ── Lion ──────────────────────────────────────────────────── */
    .session__lion {
      position: absolute;
      bottom: -15%;
      left: 50%;
      transform: translateX(-50%);
      height: 95%;
      width: auto;
    }

    /* ── Cards ─────────────────────────────────────────────────── */
    .session__card {
      width: 100%;
    }

    .session__card--memoson {
      --training-color:      var(--training-memoson-200);
      --training-color-dark: var(--training-memoson-300);
    }

    .session__card--fus-seg {
      --training-color:      var(--training-fus-seg-200);
      --training-color-dark: var(--training-fus-seg-300);
    }

    /* ── Stats row ─────────────────────────────────────────────── */
    .stats-row {
      display: flex;
      flex-direction: row;
      gap: var(--space-4);
      align-items: flex-start;
      justify-content: center;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
    }

    .stat-circle {
      width: 4rem;
      height: 4rem;
      border-radius: var(--radius-full);
      background: var(--training-color);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      flex-shrink: 0;
    }

    .stat-circle__icon {
      width: 2rem;
      height: 2rem;
      filter: brightness(0) invert(1);
    }

    .stat-circle__value {
      font-size: var(--text-2xl);
      font-weight: var(--font-bold);
      color: oklch(1 0 0);
    }

    .stat-circle__badge {
      position: absolute;
      top: -0.25rem;
      right: -0.25rem;
      width: 1.5rem;
      height: 1.5rem;
      font-size: var(--text-xs);
      border: 2px solid oklch(1 0 0);
    }

    .stat-label {
      font-size: var(--text-sm);
      font-weight: var(--font-medium);
      color: var(--foreground);
      text-align: center;
      white-space: nowrap;
    }

    /* ── Circular progress ─────────────────────────────────────── */
    @property --progress-angle-1 {
      syntax: '<angle>';
      inherits: false;
      initial-value: 0deg;
    }

    @property --progress-angle-2 {
      syntax: '<angle>';
      inherits: false;
      initial-value: 0deg;
    }

    #progress-1 {
      --progress-angle: var(--progress-angle-1);
    }

    #progress-2 {
      --progress-angle: var(--progress-angle-2);
    }

    .congrats-progress {
      width: 4rem;
      height: 4rem;
      border-radius: var(--radius-full);
      background: conic-gradient(
        var(--training-color-dark) 0deg,
        var(--training-color-dark) var(--progress-angle),
        var(--training-color) var(--progress-angle)
      );
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .congrats-progress__label {
      font-size: var(--text-2xl);
      font-weight: var(--font-bold);
      color: oklch(1 0 0);
    }
  </style>
</head>
<body>
  <div class="game-viewport">
    <div class="game-canvas">
      <div class="congrats-bg"></div>
      <div class="screen">

        <main class="screen-body screen-body--split">

          <div class="screen-pane session__pane--lion">
            <img src="assets/illustration/sucess.png" class="session__lion" alt="">
          </div>

          <div class="screen-pane session__pane--cards">

            <!-- Card 1 — Memoson -->
            <div class="card session__card--memoson">
              <div class="card__content">
                <div class="stats-row">

                  <div class="stat-item">
                    <div class="stat-circle">
                      <img src="assets/training/memoson.svg" class="stat-circle__icon" alt="">
                      <div class="badge-icon badge-icon--success stat-circle__badge">
                        <i data-lucide="check" class="text-xs"></i>
                      </div>
                    </div>
                    <span class="stat-label">Memoson</span>
                  </div>

                  <div class="stat-item">
                    <div class="stat-circle">
                      <span class="stat-circle__value">3</span>
                    </div>
                    <span class="stat-label">Bonnes réponses</span>
                  </div>

                  <div class="stat-item">
                    <div class="congrats-progress" id="progress-1">
                      <span class="congrats-progress__label" id="level-label-1">1</span>
                    </div>
                    <span class="stat-label">Niveau</span>
                  </div>

                  <div class="stat-item">
                    <div class="stat-circle">
                      <span class="stat-circle__value">10</span>
                    </div>
                    <span class="stat-label">Minutes</span>
                  </div>

                </div>
              </div>
            </div>

            <!-- Card 2 — Fus-Seg -->
            <div class="card session__card--fus-seg">
              <div class="card__content">
                <div class="stats-row">

                  <div class="stat-item">
                    <div class="stat-circle">
                      <img src="assets/training/fus-seg.svg" class="stat-circle__icon" alt="">
                      <div class="badge-icon badge-icon--success stat-circle__badge">
                        <i data-lucide="check" class="text-xs"></i>
                      </div>
                    </div>
                    <span class="stat-label">Fusion</span>
                  </div>

                  <div class="stat-item">
                    <div class="stat-circle">
                      <span class="stat-circle__value">32</span>
                    </div>
                    <span class="stat-label">Bonnes réponses</span>
                  </div>

                  <div class="stat-item">
                    <div class="congrats-progress" id="progress-2">
                      <span class="congrats-progress__label" id="level-label-2">12</span>
                    </div>
                    <span class="stat-label">Niveau</span>
                  </div>

                  <div class="stat-item">
                    <div class="stat-circle">
                      <span class="stat-circle__value">5</span>
                    </div>
                    <span class="stat-label">Minutes</span>
                  </div>

                </div>
              </div>
            </div>

          </div>

        </main>

      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script type="module" src="components/main.js"></script>
  <script>
    lucide.createIcons();

    // ── Circular progress — valeurs fixes ─────────────────────────
    document.getElementById('progress-1').style.setProperty('--progress-angle-1', (25 * 3.6) + 'deg');
    document.getElementById('progress-2').style.setProperty('--progress-angle-2', (47 * 3.6) + 'deg');
  </script>
</body>
</html>
