  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lirion">

  <link rel="apple-touch-icon" href="assets/icons/icon-180.png">
  <link rel="manifest" href="manifest.json">

  <title>Lirion — Accueil</title>
  <link rel="stylesheet" href="components/main.css">
  <style>
    #game-canvas {
      transition: background var(--duration-slow) var(--easing-default);
    }

    /* Cards sized for 2 visible + peek of 3rd.
       Left padding centers the first card horizontally. */
    .card-training {
      width: 40vw;
    }

    /* Scroll container */
    .home-body {
      padding-left: 0;
      padding-right: 0;
      justify-content: flex-start;
      scrollbar-width: none;
    }
    .home-body::-webkit-scrollbar {
      display: none;
    }

    /* Track: padding-left = (100vw - card_w) / 2 = (100 - 27) / 2 = 36.5vw
       This centers the first card on the canvas. */
    .home-cards-track {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: var(--space-5);
      flex-shrink: 0;
      padding-left: 36.5vw;
      padding-right: 8vw;
    }
  </style>
</head>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script type="module" src="components/main.js"></script>
  <script>
    lucide.createIcons();

    const canvas          = document.getElementById('game-canvas');
    const cards           = document.querySelectorAll('.card-training');
    const scrollContainer = document.querySelector('.home-body');

    function centerCard(card, smooth = true) {
      const containerWidth = scrollContainer.offsetWidth;
      const target = card.offsetLeft + card.offsetWidth / 2 - containerWidth / 2;
      scrollContainer.scrollTo({ left: target, behavior: smooth ? 'smooth' : 'instant' });
    }

    function selectCard(card) {
      const training = card.dataset.training;
      canvas.style.background = `var(--training-${training}-100)`;
      cards.forEach(c => c.classList.remove('card-training--active'));
      card.classList.add('card-training--active');
      centerCard(card);
    }

    cards.forEach(card => card.addEventListener('click', () => selectCard(card)));

    // Center the initially active card without animation
    const initialCard = document.querySelector('.card-training--active');
    if (initialCard) centerCard(initialCard, false);
  </script>
</body>
</html>
