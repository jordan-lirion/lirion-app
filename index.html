<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Lirion — Connexion</title>
  <link rel="stylesheet" href="components/main.css">
  <style>
    .game-canvas {
      background: var(--muted);
    }

    .login__card {
      width: 100%;
      max-width: 24rem;
    }
  </style>
</head>
<body>
  <div class="game-viewport">
    <div class="game-canvas">
      <div class="screen screen-layout" id="screen-login">

        <main class="screen-body">

          <div class="card login__card">

            <div class="card__content">
              <div class="field">
                <div class="input-group input-group--icon-start">
                  <input
                    class="input"
                    type="email"
                    id="login-email"
                    placeholder="Mon email"
                    autocomplete="email"
                    inputmode="email"
                    aria-describedby="email-hint"
                  >
                  <span class="input-group__icon" aria-hidden="true">
                    <i data-lucide="mail" class="text-xl"></i>
                  </span>
                </div>
                <p class="hint hint--error text-center" id="email-hint" hidden></p>
              </div>
            </div>

            <div class="card__footer">
              <button class="btn btn--default btn--lg btn--full" id="btn-continue">
                Continuer
              </button>
            </div>

          </div>

        </main>

      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script type="module" src="components/main.js"></script>
  <script type="module">
    lucide.createIcons();

    const input = document.getElementById('login-email');
    const hint  = document.getElementById('email-hint');
    const btn   = document.getElementById('btn-continue');

    function setError(msg) {
      input.classList.add('input--error');
      hint.textContent = msg;
      hint.hidden = false;
    }

    function clearError() {
      input.classList.remove('input--error');
      hint.hidden = true;
    }

    btn.addEventListener('click', () => {
      const email = input.value.trim();
      if (!email || !email.includes('@')) return setError('Cette adresse email n\'est pas valide.');
      clearError();
      window.location.href = 'password.html';
    });

    input.addEventListener('input', clearError);
  </script>
</body>
</html>
