<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <!-- === PWA / Web App iOS === -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lirion">
  <meta name="theme-color" content="#facc15">
  <link rel="apple-touch-icon" href="assets/icons/icon-180.png">
  <link rel="manifest" href="manifest.json">
  <!-- === /PWA === -->
  <title>Lirion — Memoson · Différences</title>
  <link rel="stylesheet" href="components/main.css">
  <style>
    .game-canvas {
      background: var(--training-memoson-200);
    }

    /* ── Title ─────────────────────────────────────────────────── */
    .memoson-d__title {
      font-size: var(--text-xl);
      font-weight: var(--font-semibold);
      color: oklch(1 0 0);
    }

    /* ── Pause button — memoson-300 bg, icône blanche ─────────── */
    .screen-header .btn--icon {
      background: var(--training-memoson-300);
      color: oklch(1 0 0);
    }
    .screen-header .btn--icon:hover {
      background: color-mix(in oklab, var(--training-memoson-300) 85%, black);
    }

    /* ── Count — memoson-300 bg, chiffre blanc ─────────────────── */
    .count {
      background: var(--training-memoson-300);
      color: oklch(1 0 0);
    }

    /* ── Time — camembert plein, fill = background ──────────────── */
    .time {
      --time-fill: var(--background);
      --time-bg:   var(--training-memoson-300);
      border: solid var(--space-1) var(--training-memoson-300);
    }

    /* ── Help — image zoomée + ombres ──────────────────────────── */
    .help {
      box-shadow:
        0 3px 8px oklch(0 0 0 / 0.12),
        inset 0 -1px 4px oklch(0 0 0 / 0.07);
    }

    /* ── Play button — taille help, icône memoson-300, ombres ───── */
    .screen-footer .btn--icon {
      width: 3.5rem;
      height: 3.5rem;
      color: var(--training-memoson-300);
      box-shadow:
        0 3px 8px oklch(0 0 0 / 0.12),
        inset 0 -1px 4px oklch(0 0 0 / 0.07);
    }
    .screen-footer .btn--icon:hover {
      background: color-mix(in oklab, var(--background) 85%, black);
    }

    /* ── Play button — état actif ────────────────────────────────── */
    .screen-footer .btn-play--active {
      background: var(--training-memoson-300);
      color: oklch(1 0 0);
    }
    .screen-footer .btn-play--active:hover {
      background: color-mix(in oklab, var(--training-memoson-300) 85%, black);
    }

    /* ── Audio wave icon ─────────────────────────────────────────── */
    .audio-bars {
      width: 1em;
      height: 1em;
      display: none;
      flex-shrink: 0;
    }

    .btn-play--active [data-lucide] { display: none; }
    .btn-play--active .audio-bars   { display: block; }

    .audio-bars .bar {
      transform-box: fill-box;
      transform-origin: center;
    }

    .btn-play--active .audio-bars .bar:nth-child(1) { animation: audio-bar 0.55s 0.00s ease-in-out infinite alternate; }
    .btn-play--active .audio-bars .bar:nth-child(2) { animation: audio-bar 0.70s 0.18s ease-in-out infinite alternate; }
    .btn-play--active .audio-bars .bar:nth-child(3) { animation: audio-bar 0.60s 0.08s ease-in-out infinite alternate; }
    .btn-play--active .audio-bars .bar:nth-child(4) { animation: audio-bar 0.80s 0.28s ease-in-out infinite alternate; }

    @keyframes audio-bar {
      from { transform: scaleY(0.15); }
      to   { transform: scaleY(1); }
    }

    /* ── Screen body — override pour la grille ─────────────────── */
    .screen-body {
      padding-top:    var(--screen-header-h);
      padding-bottom: var(--screen-footer-h);
      padding-left:   var(--space-5);
      padding-right:  var(--space-5);
      overflow: hidden;
    }

    /* ── Footer ancré en bas ───────────────────────────────────── */
    .screen-layout {
      justify-content: space-between;
    }

    .memoson-d__grid {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      justify-content: center;
    }

    .memoson-d__row {
      display: flex;
      gap: var(--space-3);
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="game-viewport">
    <div class="game-canvas">
      <div class="screen screen-layout">

        <header class="screen-header">
          <div class="bar-start">
            <a href="home.html" class="btn btn--icon btn--primary" aria-label="Pause">
              <i data-lucide="pause" fill="#fff" class="text-2xl"></i>
            </a>
            <span class="memoson-d__title">Memoson - Différences</span>
          </div>
          <div class="bar-end">
            <div class="count" id="score">3</div>
            <div class="time"></div>
          </div>
        </header>

        <main class="screen-body">
          <div class="memoson-d__grid">

            <!-- Ligne 1 — Instructions -->
            <div class="memoson-d__row">
              <div class="memoson-item memoson-item--instruction-on"></div>
              <div class="memoson-item memoson-item--instruction-off"></div>
              <div class="memoson-item memoson-item--instruction-on">
                <span class="memoson-item__text">FA</span>
              </div>
              <div class="memoson-item memoson-item--instruction-off">
                <span class="memoson-item__text">SI</span>
              </div>
              <div class="memoson-item memoson-item--instruction-on">
                <span class="memoson-item__text">MI</span>
              </div>
              <div class="memoson-item memoson-item--instruction-off"></div>
            </div>

            <!-- Ligne 2 — Propositions -->
            <div class="memoson-d__row">
              <div class="memoson-item memoson-item--proposition-on"></div>
              <div class="memoson-item memoson-item--proposition-off"></div>
              <div class="memoson-item memoson-item--proposition-on">
                <span class="memoson-item__text">FA</span>
              </div>
              <div class="memoson-item memoson-item--proposition-off">
                <span class="memoson-item__text">SI</span>
              </div>
              <div class="memoson-item memoson-item--proposition-on">
                <span class="memoson-item__text">LA</span>
              </div>
              <div class="memoson-item memoson-item--proposition-off">
                <span class="memoson-item__text">RE</span>
              </div>
            </div>

          </div>
        </main>

        <footer class="screen-footer">
          <div class="bar-start">
            <div class="help">
              <img src="assets/illustration/think.png" class="help__img" alt="Aide">
            </div>
          </div>
          <div class="bar-end">
            <button class="btn btn--icon btn--primary btn-play" aria-label="Jouer">
              <i data-lucide="play" class="text-2xl"></i>
              <svg class="audio-bars text-xl" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <rect class="bar" x="2"    y="0" width="2.5" height="24" rx="1.25"/>
                <rect class="bar" x="7.5"  y="0" width="2.5" height="24" rx="1.25"/>
                <rect class="bar" x="13"   y="0" width="2.5" height="24" rx="1.25"/>
                <rect class="bar" x="18.5" y="0" width="2.5" height="24" rx="1.25"/>
              </svg>
            </button>
          </div>
        </footer>

      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script type="module" src="components/main.js"></script>
  <script>
    lucide.createIcons();

    document.querySelector('.btn-play').addEventListener('click', function () {
      this.classList.toggle('btn-play--active');
    });
  </script>
</body>
</html>
