<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <!-- === PWA / Web App iOS === -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lirion">
  <meta name="theme-color" content="#facc15">
  <link rel="apple-touch-icon" href="assets/icons/icon-180.png">
  <link rel="manifest" href="manifest.json">
  <!-- === /PWA === -->
  <title>Lirion — Memoson · Différences</title>
  <link rel="stylesheet" href="components/main.css">
  <style>
    .game-canvas {
      background: var(--training-memoson-100);
    }

    .memoson-d__title {
      font-size: var(--text-lg);
      font-weight: var(--font-semibold);
      color: var(--foreground);
    }
  </style>
</head>
<body>
  <div class="game-viewport">
    <div class="game-canvas">
      <div class="screen screen-layout">

        <header class="screen-header">
          <div class="bar-start">
            <a href="home.html" class="btn btn--icon btn--primary" aria-label="Fermer">
              <i data-lucide="x" class="text-xl"></i>
            </a>
            <span class="memoson-d__title">Memoson - Différences</span>
          </div>
          <div class="bar-end">
            <div class="count" id="score">0</div>
            <div class="time">
              <svg class="time__ring" viewBox="0 0 36 36">
                <circle class="time__track"    cx="18" cy="18" r="15.9" fill="none" stroke-width="2.5"/>
                <circle class="time__progress" cx="18" cy="18" r="15.9" fill="none" stroke-width="2.5"/>
              </svg>
            </div>
          </div>
        </header>

        <main class="screen-body">
          <!-- screen body à venir -->
        </main>

        <footer class="screen-footer">
          <div class="bar-start">
            <div class="help">
              <img src="assets/illustration/think.png" class="help__img" alt="Aide">
            </div>
          </div>
          <div class="bar-end">
            <button class="btn btn--icon btn--primary" aria-label="Jouer">
              <i data-lucide="play" class="text-xl"></i>
            </button>
          </div>
        </footer>

      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script type="module" src="components/main.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
