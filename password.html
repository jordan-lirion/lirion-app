<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <!-- === PWA / Web App iOS === -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lirion">
  <meta name="theme-color" content="#facc15">
  <link rel="apple-touch-icon" href="assets/icons/icon-180.png">
  <link rel="manifest" href="manifest.json">
  <!-- === /PWA === -->
  <title>Lirion — Mot de passe</title>
  <link rel="stylesheet" href="components/main.css">
  <style>
    .game-canvas {
      background: var(--muted);
    }

    .password__card {
      width: 100%;
      max-width: 24rem;
    }

    /* ── Panes ─────────────────────────────────────────────────── */
    .password__pane--lion {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .password__pane--form {
      flex: 2;
    }

    /* ── Lion ──────────────────────────────────────────────────── */
    .password__lion {
      position: absolute;
      bottom: -15%;
      left: 50%;
      transform: translateX(-50%);
      height: 95%;
      width: auto;
    }
  </style>
</head>
<body>
  <div class="game-viewport">
    <div class="game-canvas">
      <div class="screen screen-layout" id="screen-password">

        <header class="screen-header">
          <div class="bar-start">
            <a href="index.html" class="btn btn--icon btn--primary" aria-label="Retour">
              <i data-lucide="arrow-left" class="text-xl"></i>
            </a>
          </div>
        </header>

        <main class="screen-body screen-body--split">

          <div class="screen-pane password__pane--lion">
            <img src="assets/illustration/advice.png" class="password__lion" alt="Lirion">
          </div>

          <div class="screen-pane password__pane--form">
          <div class="card password__card">

            <div class="card__header">
              <h1 class="card__title text-center">On demarre les entrainements ?</h1>
            </div>

            <div class="card__content">
              <div class="field">
                <div class="input-group input-group--icon-start input-group--icon-end">
                  <input
                    class="input"
                    type="password"
                    id="login-password"
                    placeholder="Mon mot de passe"
                    autocomplete="current-password"
                    aria-describedby="password-hint"
                  >
                  <span class="input-group__icon" aria-hidden="true">
                    <i data-lucide="lock" class="text-xl"></i>
                  </span>
                  <button
                    id="toggle-password"
                    class="input-group__icon input-group__icon--end input-group__icon--btn"
                    type="button"
                    aria-label="Afficher le mot de passe"
                  >
                    <i data-lucide="eye" class="text-xl"></i>
                    <i data-lucide="eye-off" class="text-xl hidden"></i>
                  </button>
                </div>
                <p class="hint hint--error text-center" id="password-hint" hidden></p>
              </div>
            </div>

            <div class="card__footer">
              <button class="btn btn--default btn--lg btn--full" id="btn-continue">
                Connexion
              </button>
              <a href="forgotPassword.html" class="btn btn--link">
                Mot de passe oublié ?
              </a>
            </div>

          </div>
          </div>

        </main>

      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script type="module" src="components/main.js"></script>
  <script type="module">
    lucide.createIcons();

    const input        = document.getElementById('login-password');
    const hint         = document.getElementById('password-hint');
    const btn          = document.getElementById('btn-continue');
    const toggleBtn    = document.getElementById('toggle-password');
    const eyeIcon      = toggleBtn.querySelector('[data-lucide="eye"]');
    const eyeOffIcon   = toggleBtn.querySelector('[data-lucide="eye-off"]');

    toggleBtn.addEventListener('click', () => {
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      eyeIcon.classList.toggle('hidden', isPassword);
      eyeOffIcon.classList.toggle('hidden', !isPassword);
      toggleBtn.setAttribute('aria-label', isPassword ? 'Masquer le mot de passe' : 'Afficher le mot de passe');
    });

    function setError(msg) {
      input.classList.add('input--error');
      hint.textContent = msg;
      hint.hidden = false;
    }

    function clearError() {
      input.classList.remove('input--error');
      hint.hidden = true;
    }

    btn.addEventListener('click', () => {
      const value = input.value;
      if (!value) return setError('Saisis ton mot de passe.');
      if (value.length < 6) return setError('Le mot de passe doit faire au moins 6 caractères.');
      clearError();
      window.location.href = 'home.html';
    });

    input.addEventListener('input', clearError);
  </script>
</body>
</html>
