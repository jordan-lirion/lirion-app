<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <!-- === PWA / Web App iOS === -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lirion">
  <meta name="theme-color" content="#facc15">
  <link rel="apple-touch-icon" href="assets/icons/icon-180.png">
  <link rel="manifest" href="manifest.json">
  <!-- === /PWA === -->
  <title>Lirion — Profil</title>
  <link rel="stylesheet" href="components/main.css">
  <style>
    .game-canvas {
      background: var(--muted);
    }

    .profile__card {
      width: 100%;
      max-width: 24rem;
    }

    .profile__card .card__content {
      align-items: center;
      text-align: center;
    }

    /* ── Panes ─────────────────────────────────────────────────── */
    .profile__pane--lion {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .profile__pane--form {
      flex: 2;
    }

    /* ── Lion ──────────────────────────────────────────────────── */
    .profile__lion {
      position: absolute;
      bottom: -15%;
      left: 50%;
      transform: translateX(-50%);
      height: 95%;
      width: auto;
    }
  </style>
</head>
<body>
  <div class="game-viewport">
    <div class="game-canvas">
      <div class="screen screen-layout">

        <header class="screen-header">
          <div class="bar-start">
            <a href="home.html" class="btn btn--icon btn--primary" aria-label="Retour">
              <i data-lucide="arrow-left" class="text-xl"></i>
            </a>
          </div>
          <div class="bar-end">
            <a href="index.html" class="btn btn--icon btn--primary" aria-label="Power Off">
              <i data-lucide="power" class="text-xl"></i>
            </a>
          </div>
        </header>

        <main class="screen-body screen-body--split">

          <div class="screen-pane profile__pane--lion">
            <img src="assets/illustration/hello.png" class="profile__lion" alt="Lirion">
          </div>

          <div class="screen-pane profile__pane--form">
          <div class="card profile__card">

            <div class="card__content">
              <div class="avatar avatar--lg">LH</div>
              <div>
                <h1 class="card__title">Louna Harrar</h1>
                <p class="card__description">louna.harrar@gmail.com</p>
              </div>
            </div>

            <div class="card__footer">
              <button class="btn btn--default btn--lg btn--full">
                Gérer mon abonnement
              </button>
            </div>

          </div>
          </div>

        </main>

      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script type="module" src="components/main.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
